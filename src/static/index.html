<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whisper Transcriber</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="header">
      <h1>Whisper<span>.</span>Transcriber</h1>
      <p>OpenAI Whisper · small model · CPU · local</p>
    </div>

    <div class="card">
      <div class="drop-zone" id="dropZone">
        <input
          type="file"
          id="fileInput"
          accept=".mp4,.mkv,.avi,.mov,.webm,.mp3,.wav,.m4a,.ogg,.flac"
        />
        <div class="drop-icon">🎬</div>
        <p>Drop a video or audio file here</p>
        <p>or click to browse</p>
        <div class="file-name" id="fileName"></div>
      </div>

      <div class="controls">
        <select id="langSelect">
          <option value="en">English (en)</option>
          <option value="pl">Polish (pl)</option>
          <option value="auto">🌐 Auto-detect</option>
          <option value="de">German (de)</option>
          <option value="fr">French (fr)</option>
          <option value="es">Spanish (es)</option>
        </select>
        <button id="transcribeBtn" disabled>Transcribe</button>
      </div>

      <div class="status" id="status"></div>
    </div>

    <div class="card result-card" id="resultCard">
      <div class="result-header">
        <h2>Transcription</h2>
        <div style="display: flex; gap: 8px; align-items: center">
          <span class="badge" id="langBadge"></span>
          <button class="copy-btn" id="copyBtn">Copy</button>
        </div>
      </div>

      <div class="full-text" id="fullText"></div>

      <div class="segments-label">Timestamps</div>
      <div class="segments" id="segments"></div>
    </div>

    <script>
      const dropZone = document.getElementById("dropZone");
      const fileInput = document.getElementById("fileInput");
      const fileName = document.getElementById("fileName");
      const btn = document.getElementById("transcribeBtn");
      const status = document.getElementById("status");
      const resultCard = document.getElementById("resultCard");
      const fullText = document.getElementById("fullText");
      const segmentsEl = document.getElementById("segments");
      const langBadge = document.getElementById("langBadge");
      const langSelect = document.getElementById("langSelect");
      const copyBtn = document.getElementById("copyBtn");

      let selectedFile = null;

      fileInput.addEventListener("change", () => {
        selectedFile = fileInput.files[0];
        if (selectedFile) {
          fileName.textContent = selectedFile.name;
          btn.disabled = false;
        }
      });

      dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("dragover");
      });
      dropZone.addEventListener("dragleave", () =>
        dropZone.classList.remove("dragover"),
      );
      dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("dragover");
        selectedFile = e.dataTransfer.files[0];
        if (selectedFile) {
          fileName.textContent = selectedFile.name;
          btn.disabled = false;
        }
      });

      function formatTime(s) {
        const m = Math.floor(s / 60);
        const sec = (s % 60).toFixed(1).padStart(4, "0");
        return `${String(m).padStart(2, "0")}:${sec}`;
      }

      btn.addEventListener("click", async () => {
        if (!selectedFile) return;

        btn.disabled = true;
        resultCard.classList.remove("visible");
        status.textContent = "⏳ Uploading file...";
        status.className = "status loading";

        const formData = new FormData();
        formData.append("file", selectedFile);
        formData.append("language", langSelect.value);

        try {
          status.textContent =
            "Transcription in progress — this may take a few minutes...";
          const res = await fetch("/transcribe", {
            method: "POST",
            body: formData,
          });

          if (!res.ok) {
            const err = await res.json();
            throw new Error(err.detail || "Server error");
          }

          const data = await res.json();

          fullText.textContent = data.text;
          langBadge.textContent = data.language.toUpperCase();

          segmentsEl.innerHTML = "";
          for (const seg of data.segments) {
            const div = document.createElement("div");
            div.className = "segment";
            div.innerHTML = `
          <span class="ts">${formatTime(seg.start)} → ${formatTime(seg.end)}</span>
          <span class="seg-text">${seg.text}</span>
        `;
            segmentsEl.appendChild(div);
          }

          resultCard.classList.add("visible");
          status.textContent = `Done! Detected language: ${data.language}`;
          status.className = "status";
        } catch (e) {
          status.textContent = `Error: ${e.message}`;
          status.className = "status error";
        } finally {
          btn.disabled = false;
        }
      });

      copyBtn.addEventListener("click", () => {
        navigator.clipboard.writeText(fullText.textContent);
        copyBtn.textContent = "Copied!";
        setTimeout(() => (copyBtn.textContent = "Copy"), 2000);
      });
    </script>
  </body>
</html>
