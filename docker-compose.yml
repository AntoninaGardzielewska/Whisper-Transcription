services:
  whisper:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - whisper_model:/root/.cache/whisper
    environment:
      - PYTHONUNBUFFERED=1
      - XDG_CACHE_HOME=/root/.cache
      - MONGO_URL=mongodb://mongo:27017
    depends_on:
      - mongo
    restart: unless-stopped
  mongo:
    image: mongo:latest
    volumes:
      - mongo_data:/data/db

volumes:
  whisper_model:
  mongo_data: